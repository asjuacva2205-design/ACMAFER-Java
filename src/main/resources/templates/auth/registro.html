<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro — ACMAFER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />
    <link th:href="@{/css/acmafer.css}" rel="stylesheet" />
    <style>
        :root {
            --acm-bg-dark: #0f1724;
            --acm-bg-card: #1a1f2e;
            --acm-primary: #e0e7ff;
            --acm-orange: #ff6b00;
            --acm-orange-hover: #ff8533;
            --acm-gray: #8b92a8;
            --acm-gray-lt: #a0a8c0;
            --acm-border: #2a3142;
            --font-display: 'Orbitron', 'Rajdhani', sans-serif;
        }

        body {
            background: var(--acm-bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            font-family: 'Rajdhani', sans-serif;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-triangle {
            width: 64px;
            height: 56px;
            background: linear-gradient(135deg, var(--acm-orange) 0%, #ff8533 100%);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            margin: 0 auto 16px;
            filter: drop-shadow(0 0 20px rgba(255, 107, 0, 0.5));
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 800;
            color: var(--acm-primary);
            text-decoration: none;
            display: inline-block;
            letter-spacing: 2px;
        }

        .logo-text span {
            color: var(--acm-orange);
        }

        .logo-subtitle {
            color: var(--acm-gray);
            font-size: 13px;
            margin-top: 4px;
            font-weight: 400;
        }

        .acm-card {
            background: var(--acm-bg-card);
            border: 1px solid var(--acm-border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .acm-label {
            display: block;
            color: var(--acm-gray-lt);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .acm-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 36, 0.6);
            border: 1px solid var(--acm-border);
            border-radius: 8px;
            color: var(--acm-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .acm-input:focus {
            outline: none;
            border-color: var(--acm-orange);
            box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.1);
            background: rgba(15, 23, 36, 0.8);
        }

        .acm-input::placeholder {
            color: var(--acm-gray);
        }

        .acm-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .acm-btn-primary {
            background: linear-gradient(135deg, var(--acm-orange) 0%, #ff8533 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(255, 107, 0, 0.3);
        }

        .acm-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 0, 0.4);
            color: white;
        }

        .acm-btn-google {
            background: white;
            color: #1a1f2e;
            width: 100%;
            margin-top: 16px;
        }

        .acm-btn-google:hover {
            background: #f0f0f0;
            color: #1a1f2e;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--acm-gray);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--acm-border);
        }

        .divider span {
            padding: 0 12px;
        }

        .form-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--acm-gray);
            font-size: 14px;
        }

        .form-footer a {
            color: var(--acm-orange);
            font-weight: 600;
            text-decoration: none;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .demo-credentials {
            margin-top: 24px;
            padding: 16px;
            background: rgba(255, 107, 0, 0.1);
            border: 1px solid rgba(255, 107, 0, 0.2);
            border-radius: 8px;
            font-size: 12px;
            color: var(--acm-gray-lt);
        }

        .demo-credentials strong {
            color: var(--acm-orange);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .acm-alert-danger {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff6b6b;
        }

        .text-danger {
            color: #ff6b6b !important;
            font-size: 12px;
            margin-top: 4px;
        }

        .border-danger {
            border-color: #dc3545 !important;
        }

        .form-section-title {
            color: var(--acm-orange);
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-back-home {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 10;
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .6rem 1.1rem;
            background: var(--acm-bg-card);
            border: 1px solid var(--acm-border);
            border-radius: 10px;
            color: var(--acm-gray-lt);
            font-family: 'Rajdhani', sans-serif;
            font-size: .82rem;
            font-weight: 600;
            letter-spacing: .5px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-back-home:hover {
            color: var(--acm-orange);
            border-color: var(--acm-orange);
            transform: translateX(-3px);
            box-shadow: 0 4px 14px rgba(255, 107, 0, .2);
        }

        @media (max-width: 480px) {
            .btn-back-home span {
                display: none;
            }

            .btn-back-home {
                padding: .6rem .75rem;
            }
        }
    </style>
</head>

<body>
    <a th:href="@{/}" class="btn-back-home">
        <i class="bi bi-arrow-left"></i>
        <span>Volver al inicio</span>
    </a>

    <div style="width: 100%; max-width: 480px;">

        <!-- Logo -->
        <div class="logo-container">
            <div class="logo-triangle"></div>
            <a th:href="@{/}" class="logo-text">
                ACM<span>AFER</span>
            </a>
            <div class="logo-subtitle">Sistema de Gestión Industrial</div>
        </div>

        <!-- Card -->
        <div class="acm-card">
            <h2 style="color: var(--acm-primary); font-size: 24px; margin-bottom: 8px; text-align: center;">
                Crear cuenta
            </h2>
            <p style="color: var(--acm-gray); text-align: center; margin-bottom: 24px; font-size: 14px;">
                Completa tus datos para registrarte como cliente
            </p>

            <form th:action="@{/auth/registro}" th:object="${dto}" method="post" novalidate autocomplete="off">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <!-- Alerta de errores -->
                <div class="alert acm-alert-danger" th:if="${#fields.hasGlobalErrors()}" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
                </div>

                <!-- Nombre y Apellido -->
                <div class="row g-3 mb-3">
                    <div class="col-sm-6">
                        <label class="acm-label">Nombre *</label>
                        <input type="text" th:field="*{nombre}" class="acm-input"
                            th:classappend="${#fields.hasErrors('nombre')} ? 'border-danger'" placeholder="Tu nombre"
                            autocomplete="off" />
                        <div class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="acm-label">Apellido *</label>
                        <input type="text" th:field="*{apellido}" class="acm-input"
                            th:classappend="${#fields.hasErrors('apellido')} ? 'border-danger'"
                            placeholder="Tu apellido" autocomplete="off" />
                        <div class="text-danger" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></div>
                    </div>
                </div>

                <!-- Documento -->
                <div class="mb-3">
                    <label class="acm-label">Documento *</label>
                    <input type="text" th:field="*{documento}" class="acm-input"
                        th:classappend="${#fields.hasErrors('documento')} ? 'border-danger'"
                        placeholder="Número de documento" autocomplete="off" />
                    <div class="text-danger" th:if="${#fields.hasErrors('documento')}" th:errors="*{documento}"></div>
                </div>

                <!-- Correo -->
                <div class="mb-3">
                    <label class="acm-label">Correo electrónico *</label>
                    <input type="email" th:field="*{email}" class="acm-input"
                        th:classappend="${#fields.hasErrors('email')} ? 'border-danger'"
                        placeholder="correo@ejemplo.com" autocomplete="off" />
                    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <!-- Celular -->
                <div class="mb-3">
                    <label class="acm-label">Celular</label>
                    <input type="text" th:field="*{celular}" class="acm-input" placeholder="300 000 0000"
                        autocomplete="off" />
                </div>

                <!-- Contraseña -->
                <div class="mb-4">
                    <label class="acm-label">Contraseña * (mínimo 8 caracteres)</label>
                    <div class="position-relative">
                        <input type="password" id="pwdInput" th:field="*{clave}" class="acm-input pe-5"
                            th:classappend="${#fields.hasErrors('clave')} ? 'border-danger'" placeholder="••••••••"
                            autocomplete="new-password" />
                        <button type="button" id="togglePwd" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
                                   background: none; border: none; color: var(--acm-gray); cursor: pointer;
                                   padding: 4px;">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <div class="text-danger" th:if="${#fields.hasErrors('clave')}" th:errors="*{clave}"></div>
                </div>

                <!-- Botón submit -->
                <button type="submit" class="acm-btn acm-btn-primary w-100" style="padding: 14px; font-size: 16px;">
                    <i class="bi bi-person-plus-fill"></i> Crear cuenta
                </button>

                <!-- Divider -->
                <div class="divider"><span>o</span></div>
            </form>

            <!-- Footer links - MODIFICADO -->
            <div class="form-footer">
                <p style="margin: 16px 0 0 0; font-size: 14px;">
                    ¿Ya tienes una cuenta? <a th:href="@{/auth/login}">Inicia Sesión</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('togglePwd').addEventListener('click', function () {
            const input = document.getElementById('pwdInput');
            const icon = document.getElementById('eyeIcon');
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
        });
    </script>
    <!-- Selector de idioma flotante -->
    <div class="lang-switcher-float" id="langSwitcher"></div>
    <script th:src="@{/js/i18n.js}"></script>
</body>

</html>
