<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Cambiar Contraseña — ACMAFER</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<link th:href="@{/css/acmafer.css}" rel="stylesheet"/>
</head>
<body style="background:var(--acm-gray-lt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px">
<div style="width:100%;max-width:440px">

    <div class="text-center mb-4">
        <a th:href="@{/perfil}" style="text-decoration:none">
            <span style="font-family:var(--font-display);font-size:32px;font-weight:800;color:var(--acm-primary)">
                ACM<span style="color:var(--acm-orange)">AFER</span>
            </span>
        </a>
        <h2 style="font-family:var(--font-display);font-size:22px;color:var(--acm-primary);margin-top:10px">
            Cambiar contraseña
        </h2>
    </div>

    <div class="acm-card">
        <div class="acm-card-body">
            <div class="alert acm-alert-danger mb-3" th:if="${error}">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
            </div>

            <form th:action="@{/perfil/cambiar-contrasena}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="acm-label">Contraseña actual</label>
                    <input type="password" name="claveActual" class="acm-input"
                           placeholder="••••••••" required autocomplete="current-password"/>
                </div>

                <div class="mb-3">
                    <label class="acm-label">Nueva contraseña (mínimo 8 caracteres)</label>
                    <input type="password" name="claveNueva" id="nuevaPwd" class="acm-input"
                           placeholder="••••••••" minlength="8" required autocomplete="new-password"/>
                </div>

                <div class="mb-4">
                    <label class="acm-label">Confirmar nueva contraseña</label>
                    <input type="password" id="confirmPwd" class="acm-input"
                           placeholder="••••••••" required/>
                    <div id="mismatchMsg" class="text-danger mt-1" style="font-size:12px;display:none">
                        Las contraseñas no coinciden.
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" id="submitBtn" class="acm-btn acm-btn-primary">
                        <i class="bi bi-shield-check"></i> Actualizar
                    </button>
                    <a th:href="@{/perfil}" class="acm-btn acm-btn-outline">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const n = document.getElementById('nuevaPwd');
  const c = document.getElementById('confirmPwd');
  const m = document.getElementById('mismatchMsg');
  const b = document.getElementById('submitBtn');
  function check() {
    const bad = c.value.length > 0 && n.value !== c.value;
    m.style.display = bad ? 'block' : 'none';
    b.disabled = bad;
  }
  n.addEventListener('input', check);
  c.addEventListener('input', check);
</script>
<div th:replace="~{layout/navbar :: chatbot}"></div>
<div th:replace="~{layout/navbar :: cartNotif}"></div>
<footer th:replace="~{layout/navbar :: footer}"></footer>
<th:block th:replace="~{layout/navbar :: scripts}"></th:block>
</body>
</html>
